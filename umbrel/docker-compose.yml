services:
  app_proxy:
    environment:
      APP_HOST: monero-merchant_backend_1
      APP_PORT: 8080
    image: ghcr.io/umbrel/app-proxy:1.7.0
    user: "0:0"
    volumes:
      - "${APP_DATA_DIR}:/data"

  backend:
    env_file:
      - ${APP_DATA_DIR}/.env
    environment:
      DB_HOST: db
      DB_NAME: moneromerchant
      DB_USER: moneromerchant
      DB_PORT: "5432"
      PORT: "8080"
      SECRETS_FILE: ${APP_DATA_DIR}/.secrets
      ADMIN_NAME: admin
    image: sirjamzalot/monero-merchant-backend:v2.0.0-umbrel1
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}:/data
    depends_on:
      db:
        condition: service_healthy

  db:
    env_file:
      - ${APP_DATA_DIR}/.env
    image: postgres:16-alpine
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneromerchant -d moneromerchant"]
      interval: 5s
      timeout: 3s
      retries: 20
