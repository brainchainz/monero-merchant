services:
  app_proxy:
    environment:
      APP_HOST: monero-merchant_backend_1
      APP_PORT: 8080
    image: getumbrel/app-proxy:1.7.0
    volumes:
      - "${APP_DATA_DIR}:/data"

  backend:
    env_file:
      - ${APP_DATA_DIR}/.env
    environment:
      DB_HOST: db
      DB_NAME: moneromerchant
      DB_USER: moneromerchant
      DB_PORT: "5432"
      PORT: "8080"
      SECRETS_FILE: ${APP_DATA_DIR}/.secrets
      ADMIN_NAME: admin
    image: sirjamzalot/monero-merchant-backend:v2.0.0-umbrel4
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}:/data
    depends_on:
      db:
        condition: service_healthy
      wallet-rpc:
        condition: service_started
    networks:
      - default
      - umbrel_main_network

  db:
    env_file:
      - ${APP_DATA_DIR}/.env
    image: postgres:16-alpine
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneromerchant -d moneromerchant"]
      interval: 5s
      timeout: 3s
      retries: 20

  wallet-rpc:
    env_file:
      - ${APP_DATA_DIR}/.env
    image: sethsimmons/simple-monero-wallet-rpc:latest
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/wallet:/wallet
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "exec monero-wallet-rpc --wallet-dir=/wallet --daemon-address=$MONERO_DAEMON_HOST:$MONERO_DAEMON_PORT $MONERO_WALLET_RPC_DAEMON_LOGIN --rpc-bind-port=18082 --rpc-bind-ip=0.0.0.0 --confirm-external-bind --disable-rpc-login --trusted-daemon --log-level=1"
    networks:
      - default
      - umbrel_main_network

networks:
  umbrel_main_network:
    external: true
